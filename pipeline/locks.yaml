# Filesystem permission rules per agent
permissions:
  agent-1-testgen:
    read:  ["specs/**"]
    write:
      - "tests/manifest.json"
      - "tests/requirements.txt"
      - "tests/conftest.py"
      - "tests/backend/conftest.py"
      - "tests/backend/__init__.py"
      - "tests/backend/unit/**"
      - "tests/backend/integration/**"
      - "tests/frontend/conftest.ts"
      - "tests/frontend/unit/**"
      - "tests/frontend/component/**"
      - "tests/frontend/e2e/**"
    deny:
      - "tests/backend/contract/**"
      - "tests/frontend/contract/**"
      - "src/**"
      - "agents/**"
      - "pipeline/**"
    # Paths removed from post-snapshot attribution: npm refreshes the lockfile when
    # the agent runs install in src/frontend; that is not an intentional src/** write.
    # Works even if package-lock.json is tracked (gitignore alone does not).
    ignore_for_attribution:
      - "src/frontend/package-lock.json"

  agent-2-codegen:
    read:  ["specs/**", "tests/**"]
    write: ["src/**"]
    deny:  ["tests/**", "specs/**", "agents/**", "pipeline/**"]

  agent-3-review:
    read:  ["specs/**", "tests/**", "src/**"]
    write: ["pipeline/reports/**"]
    deny:  ["src/**", "tests/**", "specs/**"]

  agent-4-docgen:
    read:  ["specs/**", "tests/**", "src/**", "README.md", "CLAUDE.md"]
    write: ["README.md", "CLAUDE.md"]
    deny:  ["tests/**", "src/**", "agents/**", "pipeline/**", "specs/**"]
