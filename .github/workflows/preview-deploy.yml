name: Preview Deploy (Railway)

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  deploy-preview:
    if: startsWith(github.head_ref, 'agent/feature-') && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_BACKEND }}
        run: railway up --environment pr-${{ github.event.number }}
        working-directory: src/backend

      - name: Deploy frontend to preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_FRONTEND }}
        run: railway up --environment pr-${{ github.event.number }}
        working-directory: src/frontend

      - name: Get preview URLs and comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAILWAY_TOKEN_BACKEND: ${{ secrets.RAILWAY_TOKEN_BACKEND }}
          RAILWAY_TOKEN_FRONTEND: ${{ secrets.RAILWAY_TOKEN_FRONTEND }}
        run: |
          BACKEND_URL=$(RAILWAY_TOKEN=$RAILWAY_TOKEN_BACKEND railway status --environment pr-${{ github.event.number }} --json | jq -r '.url // "pending"')
          FRONTEND_URL=$(RAILWAY_TOKEN=$RAILWAY_TOKEN_FRONTEND railway status --environment pr-${{ github.event.number }} --json | jq -r '.url // "pending"')
          gh pr comment ${{ github.event.number }} --body "## Sandbox Preview

          The preview environment is ready.

          | Service | URL |
          |---------|-----|
          | Frontend | $FRONTEND_URL |
          | Backend API | $BACKEND_URL |

          _Deployed via Railway — environment \`pr-${{ github.event.number }}\`_"

  teardown-preview:
    if: startsWith(github.head_ref, 'agent/feature-') && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Tear down backend preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_BACKEND }}
        run: railway environment delete pr-${{ github.event.number }} --yes
        continue-on-error: true

      - name: Tear down frontend preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_FRONTEND }}
        run: railway environment delete pr-${{ github.event.number }} --yes
        continue-on-error: true
