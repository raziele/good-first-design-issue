name: Tests to Code (Agents 2 & 3)

on:
  push:
    branches:
      - main
    paths:
      - "tests/**"
  workflow_dispatch:

jobs:
  baseline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: pip install -r src/backend/requirements.txt
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci
        continue-on-error: true

      - name: Run backend tests (expected red)
        run: echo "TODO — run pytest tests/backend/"

      - name: Run frontend tests (expected red)
        run: echo "TODO — run vitest tests/frontend/"

  agent-2-codegen:
    needs: baseline-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install codegen skills
        run: npx skills@latest add https://github.com/pbakaus/impeccable --skill frontend-design --yes

      - name: Run Agent 2 — Code Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-2-codegen

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-2-codegen

      - name: Upload codegen output
        uses: actions/upload-artifact@v4
        with:
          name: codegen-src
          path: src/

  post-codegen-tests:
    needs: agent-2-codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download codegen source
        uses: actions/download-artifact@v4
        with:
          name: codegen-src
          path: src/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: pip install -r src/backend/requirements.txt
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci
        continue-on-error: true

      - name: Run backend tests
        run: echo "TODO — run pytest tests/backend/"

      - name: Run frontend tests
        run: echo "TODO — run vitest tests/frontend/"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-codegen-test-results
          path: tests/

  agent-3-review:
    needs: post-codegen-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download codegen source
        uses: actions/download-artifact@v4
        with:
          name: codegen-src
          path: src/

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: post-codegen-test-results
          path: tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml verify-everything

      - name: Install reviewer skills
        run: echo "1" | curl -fsSL https://raw.githubusercontent.com/imbue-ai/vet/main/install-skill.sh | bash

      - name: Run Agent 3 — Reviewer
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-3-review --extra-context "$(git diff HEAD~1)"

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-3-review

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: pipeline/reports/

  open-code-pr:
    needs: agent-3-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download codegen source
        uses: actions/download-artifact@v4
        with:
          name: codegen-src
          path: src/

      - name: Commit generated source and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "agent-2-codegen[bot]"
          git config user.email "agent-2-codegen[bot]@users.noreply.github.com"
          git checkout -b agent/src-${{ github.run_id }}
          git add src/
          if git diff --cached --quiet; then
            echo "No source changes — skipping PR."
            exit 0
          fi
          git commit -m "feat(src): codegen pass to pass tests [run ${{ github.run_id }}]"
          git push -u origin agent/src-${{ github.run_id }}
          gh pr create \
            --title "feat(src): code generated by agent-2-codegen" \
            --body "Auto-generated by agent-2-codegen[bot]. See review-report artifact for Agent 3 analysis. A sandbox preview will be deployed automatically." \
            --base main
