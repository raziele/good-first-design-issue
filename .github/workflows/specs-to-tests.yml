name: Specs to Tests (Agent 1)

on:
  push:
    branches:
      - main
    paths:
      - "specs/**"
  workflow_dispatch:

jobs:
  agent-1-testgen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install testgen skills
        run: npx skills@latest add mattpocock/skills/tdd --yes

      - name: Run Agent 1 — Test Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-1-testgen

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-1-testgen

      - name: Commit generated tests and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "agent-1-testgen[bot]"
          git config user.email "agent-1-testgen[bot]@users.noreply.github.com"
          git checkout -b agent/tests-${{ github.run_id }}
          git add tests/
          if git diff --cached --quiet; then
            echo "No test changes — skipping PR."
            exit 0
          fi
          git commit -m "chore(tests): regenerate from specs [run ${{ github.run_id }}]"
          git push -u origin agent/tests-${{ github.run_id }}
          gh pr create \
            --title "chore(tests): regenerated tests from spec changes" \
            --body "Auto-generated by agent-1-testgen[bot]. Review before merging to unblock Agent 2." \
            --base main
