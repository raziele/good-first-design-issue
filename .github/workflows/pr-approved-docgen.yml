name: PR Approved — Doc Generator (Agent 4)

on:
  pull_request_review:
    types: [submitted]

jobs:
  agent-4-docgen:
    if: >
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'agent/src-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Run Agent 4 — Doc Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-4-docgen

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-4-docgen

      - name: Commit updated docs to PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "agent-4-docgen[bot]"
          git config user.email "agent-4-docgen[bot]@users.noreply.github.com"
          git add README.md CLAUDE.md
          if git diff --cached --quiet; then
            echo "No doc changes — skipping commit."
            exit 0
          fi
          git commit -m "docs: update README and CLAUDE.md after review approval [run ${{ github.run_id }}]"
          git push origin ${{ github.event.pull_request.head.ref }}
