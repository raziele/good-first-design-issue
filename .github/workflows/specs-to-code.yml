name: Specs to Code (Full TDD Pipeline)

on:
  push:
    branches:
      - main
      - "specs/**"
    paths:
      - "specs/**"
      - ".github/workflows/specs-to-code.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  branch_preflight:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm workflow is healthy on feature/spec branches
        run: echo "Preflight passed for ${{ github.ref_name }}."

  agent_1_testgen:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create_branch.outputs.branch }}
      has_changes: ${{ steps.commit_tests.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Create feature branch
        id: create_branch
        run: |
          BRANCH="agent/feature-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install testgen skills
        run: npx skills@latest add https://github.com/mattpocock/skills/blob/main/skills/engineering/tdd/ --yes

      - name: Run Agent 1 — Test Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-1-testgen

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-1-testgen

      - name: Commit tests to feature branch
        id: commit_tests
        run: |
          git config user.name "agent-1-testgen[bot]"
          git config user.email "agent-1-testgen[bot]@users.noreply.github.com"
          git add tests/
          if git diff --cached --quiet; then
            echo "No test changes."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "test: generate tests from specs [run ${{ github.run_id }}]"
            git push -u origin ${{ steps.create_branch.outputs.branch }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  pre_codegen_red_phase:
    needs: agent_1_testgen
    if: needs.agent_1_testgen.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          pip install pytest
          pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Verify red phase (all generated tests must fail pre-codegen)
        env:
          PYTHONPATH: ${{ github.workspace }}/src/backend
        run: |
          ran_any=0
          failing_checks=0

          if [ -d tests/backend ] || [ -d src/backend/tests ]; then
            ran_any=$((ran_any + 1))
            set +e
            python -m pytest tests/backend/ -v --tb=short --color=yes 2>&1
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::error::Backend generated tests unexpectedly passed pre-codegen."
            elif [ "$rc" -eq 5 ]; then
              echo "::error::Red phase gate: pytest collected zero backend tests."
              exit 1
            else
              failing_checks=$((failing_checks + 1))
              echo "Backend tests failed as expected (exit $rc)."
            fi
          fi

          if [ -d tests/frontend ]; then
            ran_any=$((ran_any + 1))
            set +e
            npx vitest run ../../tests/frontend --reporter=verbose --passWithNoTests=false 2>&1
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "::error::Frontend generated tests unexpectedly passed pre-codegen."
            else
              failing_checks=$((failing_checks + 1))
              echo "Frontend tests failed as expected (exit $rc)."
            fi
          fi

          if [ "$ran_any" -eq 0 ]; then
            echo "::error::Red phase gate failed: no runnable generated tests were found."
            exit 1
          fi

          if [ "$failing_checks" -ne "$ran_any" ]; then
            echo "::error::Red phase gate failed: all generated test checks must fail before codegen (failed $failing_checks of $ran_any)."
            exit 1
          fi

          echo "Red phase confirmed: all $ran_any generated test checks failed pre-codegen."

  agent_2_codegen:
    needs: [agent_1_testgen, pre_codegen_red_phase]
    if: needs.agent_1_testgen.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install backend dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Install codegen skills
        run: npx skills@latest add https://github.com/pbakaus/impeccable --yes

      - name: Run Agent 2 — Code Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-2-codegen

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-2-codegen

      - name: Commit code to feature branch
        run: |
          git config user.name "agent-2-codegen[bot]"
          git config user.email "agent-2-codegen[bot]@users.noreply.github.com"
          git add src/
          if git diff --cached --quiet; then
            echo "No source changes."
          else
            git commit -m "feat: implement code to pass tests [run ${{ github.run_id }}]"
            git push origin ${{ needs.agent_1_testgen.outputs.branch_name }}
          fi

  post_codegen_tests:
    needs: [agent_1_testgen, agent_2_codegen]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          pip install pytest
          pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src/backend
        run: python -m pytest tests/backend/ -vv --tb=short --color=yes

      - name: Run frontend tests
        working-directory: src/frontend
        run: npx vitest run ../../tests/frontend --reporter=verbose

  agent_3_review:
    needs: [agent_1_testgen, post_codegen_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install reviewer skills
        run: npx skills@latest add https://github.com/imbue-ai/vet --yes

      - name: Run Agent 3 — Reviewer
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p pipeline/reports
          git fetch origin main
          DIFF_FILE="$(mktemp)"
          set +e
          git diff origin/main...HEAD > "${DIFF_FILE}"
          DIFF_RC=$?
          set -e
          if [ "${DIFF_RC}" -ne 0 ]; then
            echo "::warning::git diff origin/main...HEAD failed (exit ${DIFF_RC}); continuing without merge diff context"
            : > "${DIFF_FILE}"
          fi
          python scripts/run_agent.py agent-3-review --extra-context-file "${DIFF_FILE}"
          rm -f "${DIFF_FILE}"

      - name: Validate file scope
        run: scripts/validate_scope.sh agent-3-review

      - name: Verify review report exists
        run: |
          if [ ! -d pipeline/reports ] || [ -z "$(ls -A pipeline/reports/)" ]; then
            echo "::error::Expected at least one file in pipeline/reports/"
            ls -la pipeline/reports || true
            exit 1
          fi
          echo "Review report found:"
          ls -la pipeline/reports/

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: pipeline/reports/

  open_pr:
    needs: [agent_1_testgen, agent_3_review]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY="$(cat <<'EOF'
          ## Auto-generated TDD Cycle

          **This is the only human checkpoint in the pipeline.**

          ### What's in this PR
          - **Tests** generated by agent-1-testgen[bot] from specs
          - **Code** generated by agent-2-codegen[bot] to pass those tests
          - **Review** completed by agent-3-review[bot] (see `review-report` artifact)

          ### Next steps
          1. A Railway sandbox preview will deploy automatically
          2. **Test the app** in the sandbox
          3. **Approve the PR** -> triggers Agent 4 to update docs
          4. **Merge** -> everything lands on main together
          EOF
          )"
          gh pr create \
            --title "feat: TDD cycle — tests + code from specs [run ${{ github.run_id }}]" \
            --body "$PR_BODY" \
            --base main
