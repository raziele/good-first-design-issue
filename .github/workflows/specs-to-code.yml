name: Specs to Code (Full TDD Pipeline)

on:
  push:
    branches:
      - main
      - "specs/**"
    paths:
      - "specs/**"
      - ".github/workflows/specs-to-code.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  branch_preflight:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm workflow is healthy on feature/spec branches
        run: echo "Preflight passed for ${{ github.ref_name }}."

  agent_1_testgen:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.create_branch.outputs.branch }}
      has_changes: ${{ steps.commit_tests.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v5

      - name: Create feature branch
        id: create_branch
        run: |
          BRANCH="agent/feature-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install testgen skills
        run: npx skills@latest add https://github.com/mattpocock/skills/blob/main/skills/engineering/tdd/ --yes

      - name: Snapshot worktree (pre-agent)
        id: pre_snapshot
        run: |
          # Capture the worktree state immediately before the agent runs so
          # validate_scope.sh can attribute file changes accurately. Anything
          # already untracked at this point (skill installer outputs, npm/pip
          # leftovers, etc.) is excluded from the agent's diff downstream.
          snap="$RUNNER_TEMP/worktree-pre-agent-1.txt"
          git ls-files --modified --others --exclude-standard | sort -u > "$snap"
          echo "path=$snap" >> "$GITHUB_OUTPUT"
          echo "Pre-agent worktree snapshot ($(wc -l < "$snap" | tr -d ' ') entries):"
          sed 's/^/  /' "$snap" || true

      - name: Run Agent 1 — Test Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-1-testgen

      - name: Validate file scope
        env:
          PRE_SNAPSHOT: ${{ steps.pre_snapshot.outputs.path }}
        run: scripts/validate_scope.sh agent-1-testgen

      - name: Commit tests to feature branch
        id: commit_tests
        run: |
          git config user.name "agent-1-testgen[bot]"
          git config user.email "agent-1-testgen[bot]@users.noreply.github.com"
          git add tests/
          if git diff --cached --quiet; then
            echo "No test changes."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "test: generate tests from specs [run ${{ github.run_id }}]"
            git push -u origin ${{ steps.create_branch.outputs.branch }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and commit SUT stubs
        if: steps.commit_tests.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          python scripts/generate_sut_stubs.py --repo-root "${{ github.workspace }}"
          git config user.name "agent-1-testgen[bot]"
          git config user.email "agent-1-testgen[bot]@users.noreply.github.com"
          git add src/backend/app
          if git diff --cached --quiet; then
            echo "No SUT stub changes."
          else
            git commit -m "chore: generate SUT stubs for app imports [run ${{ github.run_id }}]"
            git push origin HEAD
          fi

  pre_codegen_red_phase:
    needs: agent_1_testgen
    if: needs.agent_1_testgen.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Compute changed test files vs origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main

          backend_list="$RUNNER_TEMP/changed-backend-tests.txt"
          frontend_list="$RUNNER_TEMP/changed-frontend-tests.txt"

          # Driver tests only — contract tests under tests/**/contract/** pin
          # pre-existing baseline behavior and are exempt from the red-phase
          # gate (they're allowed to pass pre-codegen).
          git diff --name-only --diff-filter=AM origin/main...HEAD -- 'tests/backend/' \
            | grep -E '/test_[^/]+\.py$' \
            | grep -Ev '^tests/backend/contract/' \
            > "$backend_list" || true
          git diff --name-only --diff-filter=AM origin/main...HEAD -- 'tests/frontend/' \
            | grep -E '\.(test|spec)\.[cm]?[jt]sx?$' \
            | grep -Ev '^tests/frontend/contract/' \
            > "$frontend_list" || true

          echo "CHANGED_BACKEND_TESTS=$backend_list" >> "$GITHUB_ENV"
          echo "CHANGED_FRONTEND_TESTS=$frontend_list" >> "$GITHUB_ENV"

          backend_count=$(wc -l < "$backend_list" | tr -d ' ')
          frontend_count=$(wc -l < "$frontend_list" | tr -d ' ')
          echo "Changed backend driver test files ($backend_count):"
          sed 's/^/  - /' "$backend_list" || true
          echo "Changed frontend driver test files ($frontend_count):"
          sed 's/^/  - /' "$frontend_list" || true
          echo "(Contract tests under tests/**/contract/** are exempt from this gate.)"

      - name: Static SUT-import guard (changed tests must reference production code)
        run: |
          set -euo pipefail
          violations=0

          if [ -s "$CHANGED_BACKEND_TESTS" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if ! grep -Eq '^[[:space:]]*(from[[:space:]]+app(\.|[[:space:]])|import[[:space:]]+app(\.|$|[[:space:]]))' "$f"; then
                echo "::error file=$f::Backend test does not import the system under test (expected 'from app.<module> import ...' or 'import app.<module>')."
                violations=$((violations + 1))
              fi
            done < "$CHANGED_BACKEND_TESTS"
          fi

          if [ -s "$CHANGED_FRONTEND_TESTS" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if ! grep -Eq "from[[:space:]]+['\"][^'\"]*src/frontend/src/" "$f"; then
                echo "::error file=$f::Frontend test does not import from the SUT (expected a relative import containing 'src/frontend/src/')."
                violations=$((violations + 1))
              fi
            done < "$CHANGED_FRONTEND_TESTS"
          fi

          if [ "$violations" -gt 0 ]; then
            echo "::error::Static SUT-import guard failed: $violations changed test file(s) do not exercise production code. Tests must import the SUT, not redefine it inline."
            exit 1
          fi

          echo "SUT-import guard passed: every changed test file imports from the SUT."

      - name: Verify red phase (each changed test file must fail pre-codegen)
        env:
          PYTHONPATH: ${{ github.workspace }}/src/backend
        run: |
          set -euo pipefail
          ran_any=0
          unexpected_pass=0

          if [ -s "$CHANGED_BACKEND_TESTS" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              ran_any=$((ran_any + 1))
              pytest_log="$(mktemp)"
              set +e
              python -m pytest "$f" -v --tb=short --color=yes 2>&1 | tee "$pytest_log"
              rc=${PIPESTATUS[0]}
              set -e
              case "$rc" in
                0)
                  echo "::error file=$f::Backend test file passed pre-codegen — every changed test file must have at least one failing test before codegen runs."
                  unexpected_pass=$((unexpected_pass + 1))
                  ;;
                5)
                  echo "::error file=$f::pytest collected zero tests in this file (likely a collection or import bug)."
                  unexpected_pass=$((unexpected_pass + 1))
                  ;;
                *)
                  # Distinguish "tests ran and at least one failed" (good)
                  # from "pytest never finished a test run" (config bug —
                  # plugin load crash, conftest import error, internal error).
                  # A successful pytest run always emits a final summary line
                  # like "===== 1 failed in 0.05s =====" or "===== no tests ran in 0.01s =====".
                  # If that line is absent, pytest crashed before running tests
                  # and exit-code-only checks would falsely treat it as expected red.
                  if grep -Eq '^=+ .* in [0-9]+(\.[0-9]+)?s' "$pytest_log"; then
                    echo "OK: $f failed as expected (exit $rc)."
                  else
                    echo "::error file=$f::pytest exited $rc but produced no test summary line (likely a plugin-load, conftest, or internal error before any test ran). Treating as a config bug, not expected red."
                    unexpected_pass=$((unexpected_pass + 1))
                  fi
                  ;;
              esac
              rm -f "$pytest_log"
            done < "$CHANGED_BACKEND_TESTS"
          fi

          if [ -s "$CHANGED_FRONTEND_TESTS" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              ran_any=$((ran_any + 1))
              vitest_log="$(mktemp)"
              fe_relative="../../$f"
              set +e
              ( cd src/frontend && npx vitest run "$fe_relative" --reporter=verbose --passWithNoTests=false ) 2>&1 | tee "$vitest_log"
              rc=${PIPESTATUS[0]}
              set -e
              if [ "$rc" -eq 0 ]; then
                echo "::error file=$f::Frontend test file passed pre-codegen — every changed test file must have at least one failing test before codegen runs."
                unexpected_pass=$((unexpected_pass + 1))
              elif grep -q "No test files found" "$vitest_log"; then
                echo "::error file=$f::vitest collected zero tests for this file (config / include-glob bug, not an expected red signal)."
                unexpected_pass=$((unexpected_pass + 1))
              else
                echo "OK: $f failed as expected (exit $rc)."
              fi
              rm -f "$vitest_log"
            done < "$CHANGED_FRONTEND_TESTS"
          fi

          if [ "$ran_any" -eq 0 ]; then
            echo "::warning::No changed test files vs origin/main; red phase has nothing to verify. Skipping."
            exit 0
          fi

          if [ "$unexpected_pass" -gt 0 ]; then
            echo "::error::Red phase gate failed: $unexpected_pass of $ran_any changed test file(s) did not fail pre-codegen."
            exit 1
          fi

          echo "Red phase confirmed: all $ran_any changed test file(s) failed pre-codegen."

  agent_2_codegen:
    needs: [agent_1_testgen, pre_codegen_red_phase]
    if: needs.agent_1_testgen.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install backend dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Install codegen skills
        run: npx skills@latest add https://github.com/pbakaus/impeccable --yes

      - name: Snapshot worktree (pre-agent)
        id: pre_snapshot
        run: |
          # See agent_1_testgen for rationale. Critical for agent-2 because its
          # prompt instructs it to run pytest/vitest as part of self-verification,
          # which leaves cache artifacts (.vite/, .pytest_cache/, …) that would
          # otherwise be misattributed to the agent.
          snap="$RUNNER_TEMP/worktree-pre-agent-2.txt"
          git ls-files --modified --others --exclude-standard | sort -u > "$snap"
          echo "path=$snap" >> "$GITHUB_OUTPUT"
          echo "Pre-agent worktree snapshot ($(wc -l < "$snap" | tr -d ' ') entries):"
          sed 's/^/  /' "$snap" || true

      - name: Run Agent 2 — Code Generator
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: python scripts/run_agent.py agent-2-codegen

      - name: Validate file scope
        env:
          PRE_SNAPSHOT: ${{ steps.pre_snapshot.outputs.path }}
        run: scripts/validate_scope.sh agent-2-codegen

      - name: Commit code to feature branch
        run: |
          git config user.name "agent-2-codegen[bot]"
          git config user.email "agent-2-codegen[bot]@users.noreply.github.com"
          git add src/
          if git diff --cached --quiet; then
            echo "No source changes."
          else
            git commit -m "feat: implement code to pass tests [run ${{ github.run_id }}]"
            git push origin ${{ needs.agent_1_testgen.outputs.branch_name }}
          fi

  post_codegen_tests:
    needs: [agent_1_testgen, agent_2_codegen]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install -r src/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src/backend
        run: python -m pytest tests/backend/ -vv --tb=short --color=yes

      - name: Run frontend tests
        working-directory: src/frontend
        run: npx vitest run ../../tests/frontend --reporter=verbose

  agent_3_review:
    needs: [agent_1_testgen, post_codegen_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          curl https://cursor.com/install -fsS | bash
          pip install pyyaml

      - name: Install reviewer skills
        run: npx skills@latest add https://github.com/imbue-ai/vet --yes

      - name: Snapshot worktree (pre-agent)
        id: pre_snapshot
        run: |
          # mkdir pipeline/reports is intentionally NOT done here — it lives in
          # the agent step below. We snapshot before that so the directory
          # creation is attributed to the agent (which is allowed under
          # write: ["pipeline/reports/**"]).
          snap="$RUNNER_TEMP/worktree-pre-agent-3.txt"
          git ls-files --modified --others --exclude-standard | sort -u > "$snap"
          echo "path=$snap" >> "$GITHUB_OUTPUT"
          echo "Pre-agent worktree snapshot ($(wc -l < "$snap" | tr -d ' ') entries):"
          sed 's/^/  /' "$snap" || true

      - name: Run Agent 3 — Reviewer
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p pipeline/reports
          git fetch origin main
          DIFF_FILE="$(mktemp)"
          set +e
          git diff origin/main...HEAD > "${DIFF_FILE}"
          DIFF_RC=$?
          set -e
          if [ "${DIFF_RC}" -ne 0 ]; then
            echo "::warning::git diff origin/main...HEAD failed (exit ${DIFF_RC}); continuing without merge diff context"
            : > "${DIFF_FILE}"
          fi
          python scripts/run_agent.py agent-3-review --extra-context-file "${DIFF_FILE}"
          rm -f "${DIFF_FILE}"

      - name: Validate file scope
        env:
          PRE_SNAPSHOT: ${{ steps.pre_snapshot.outputs.path }}
        run: scripts/validate_scope.sh agent-3-review

      - name: Verify review report exists
        run: |
          if [ ! -d pipeline/reports ] || [ -z "$(ls -A pipeline/reports/)" ]; then
            echo "::error::Expected at least one file in pipeline/reports/"
            ls -la pipeline/reports || true
            exit 1
          fi
          echo "Review report found:"
          ls -la pipeline/reports/

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: review-report
          path: pipeline/reports/

  open_pr:
    needs: [agent_1_testgen, agent_3_review]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.agent_1_testgen.outputs.branch_name }}

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY="$(cat <<'EOF'
          ## Auto-generated TDD Cycle

          **This is the only human checkpoint in the pipeline.**

          ### What's in this PR
          - **Tests** generated by agent-1-testgen[bot] from specs
          - **Code** generated by agent-2-codegen[bot] to pass those tests
          - **Review** completed by agent-3-review[bot] (see `review-report` artifact)

          ### Next steps
          1. A Railway sandbox preview will deploy automatically
          2. **Test the app** in the sandbox
          3. **Approve the PR** -> triggers Agent 4 to update docs
          4. **Merge** -> everything lands on main together
          EOF
          )"
          gh pr create \
            --title "feat: TDD cycle — tests + code from specs [run ${{ github.run_id }}]" \
            --body "$PR_BODY" \
            --base main
