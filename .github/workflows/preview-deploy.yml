name: Preview Deploy (Railway)

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  deploy-preview:
    if: startsWith(github.head_ref, 'agent/feature-') && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service backend \
            --environment pr-${{ github.event.number }} \
            --detach

      - name: Deploy frontend to Railway preview
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service frontend \
            --environment pr-${{ github.event.number }} \
            --detach

      - name: Post preview URLs as PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          BACKEND_URL=$(railway status \
            --service backend \
            --environment pr-${{ github.event.number }} \
            --json | jq -r '.url')
          FRONTEND_URL=$(railway status \
            --service frontend \
            --environment pr-${{ github.event.number }} \
            --json | jq -r '.url')
          gh pr comment ${{ github.event.number }} --body "## Sandbox Preview

          The preview environment is ready. Play with it before approving the PR.

          | Service | URL |
          |---------|-----|
          | Frontend | $FRONTEND_URL |
          | Backend API | $BACKEND_URL |

          _Deployed by agent-2-codegen[bot] via Railway — environment \`pr-${{ github.event.number }}\`_"

  teardown-preview:
    if: startsWith(github.head_ref, 'agent/feature-') && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Tear down Railway preview environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway environment delete pr-${{ github.event.number }} --yes
